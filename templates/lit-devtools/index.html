<!-- @template name="Lit DevTools" description="Full Vite-style DevTools window for a Lit app — rail, overview, element inspector, timeline, settings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lit DevTools</title>
<link rel="icon" href="../../assets/flame-favicon.svg" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, hsl(232 60% 12% / 0.5), transparent 60%),
      #030303;
    font-family: 'Manrope', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 28px; box-sizing: border-box;
  }
  #app { width: 100%; max-width: 1224px; height: 764px; max-height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
</head>
<body>
  <div id="app"></div>
  <script src="../../ui_kits/devtools/data.js"></script>
  <script type="text/babel" src="../../ui_kits/devtools/OverviewScreen.jsx"></script>
  <script type="text/babel" src="../../ui_kits/devtools/ElementsScreen.jsx"></script>
  <script type="text/babel" src="../../ui_kits/devtools/TimelineScreen.jsx"></script>
  <script type="text/babel" src="../../ui_kits/devtools/RoutesScreen.jsx"></script>
  <script type="text/babel" src="../../ui_kits/devtools/SettingsScreen.jsx"></script>
  <script type="text/babel" src="../../ui_kits/devtools/DevToolsShell.jsx"></script>
  <script type="text/babel" data-presets="react">
    function mount() {
      if (!window.LitDesignSystem_5536fe || !window.DevToolsShell) { setTimeout(mount, 30); return; }
      ReactDOM.createRoot(document.getElementById('app')).render(<DevToolsShell />);
    }
    window.addEventListener('DOMContentLoaded', mount);
  </script>
</body>
</html>

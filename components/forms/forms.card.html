<!-- @dsCard group="Components" viewport="700x230" name="Forms — Input & Switch" subtitle="Text fields and toggles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; min-height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-sans); padding: 22px; }
  .lbl { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-sans); text-transform: uppercase;
    letter-spacing: var(--tracking-caps); color: var(--text-muted); margin: 0 0 8px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  kbd { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-mono); background: var(--surface-container-high);
    color: var(--text-secondary); padding: 3px 6px; border-radius: var(--radius-xs); }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <p class="lbl">Input</p>
      <div class="stack">
        <lit-input icon="search" placeholder="Find components…"></lit-input>
        <lit-input placeholder="Filter state…">
          <kbd slot="trailing">⌘K</kbd>
        </lit-input>
        <lit-input placeholder="Invalid value" invalid></lit-input>
      </div>
    </div>
    <div>
      <p class="lbl">Switch</p>
      <div class="stack">
        <lit-switch id="sw-a" checked label="Highlight updates"></lit-switch>
        <lit-switch id="sw-b" label="Group components by file"></lit-switch>
        <lit-switch disabled label="Experimental (disabled)"></lit-switch>
      </div>
    </div>
  </div>

  <script type="module" src="../../src/index.ts"></script>
  <script type="module">
    document.getElementById('sw-a').addEventListener('change', (e) => console.log('sw-a:', e.detail.checked));
    document.getElementById('sw-b').addEventListener('change', (e) => console.log('sw-b:', e.detail.checked));
  </script>
</body>
</html>

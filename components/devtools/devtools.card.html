<!-- @dsCard group="Components" viewport="700x360" name="DevTools — tree, state, stats" subtitle="StatCard, SegmentedTabs, TreeNode, StateRow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-sans); padding: 22px; }
  .lbl { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-sans); text-transform: uppercase;
    letter-spacing: var(--tracking-caps); color: var(--text-muted); margin: 0 0 8px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .panel { background: var(--surface-container); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 8px; }
</style>
</head>
<body>
  <div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 22px;">
    <lit-stat-card icon="package" value="v3.2.1" label="Lit" accent></lit-stat-card>
    <lit-stat-card icon="route" value="6" label="pages"></lit-stat-card>
    <lit-stat-card icon="components" value="24" label="custom elements"></lit-stat-card>
  </div>

  <div style="margin-bottom: 14;">
    <lit-segmented-tabs id="demo-tabs"></lit-segmented-tabs>
  </div>

  <div class="cols">
    <div>
      <p class="lbl">TreeNode</p>
      <div class="panel" id="tree-panel"></div>
    </div>
    <div>
      <p class="lbl">StateRow</p>
      <div class="panel" id="state-panel"></div>
    </div>
  </div>

  <script type="module" src="../../src/index.ts"></script>
  <script type="module">
    // ---- Tabs ----
    const tabs = document.getElementById('demo-tabs');
    tabs.items = [
      { id: 'props', label: 'Properties' },
      { id: 'attrs', label: 'Attributes' },
      { id: 'events', label: 'Events' },
    ];
    tabs.value = 'props';

    // ---- Tree ----
    const state = { selected: 'list' };
    function buildTree() {
      const wrap = document.getElementById('tree-panel');
      wrap.innerHTML = '';
      const sel = (id) => {
        state.selected = id;
        buildTree();
      };
      const app = document.createElement('lit-tree-node');
      app.tag = 'todo-app'; app.depth = 0; app.expandable = true; app.expanded = true;
      app.selected = state.selected === 'app';
      app.addEventListener('select', () => sel('app'));
      const header = document.createElement('lit-tree-node');
      header.tag = 'todo-header'; header.depth = 1;
      header.selected = state.selected === 'header';
      header.addEventListener('select', () => sel('header'));
      const list = document.createElement('lit-tree-node');
      list.tag = 'todo-list'; list.depth = 1; list.expandable = true; list.expanded = true;
      list.badge = '3'; list.selected = state.selected === 'list';
      list.addEventListener('select', () => sel('list'));
      const item = document.createElement('lit-tree-node');
      item.tag = 'todo-item'; item.depth = 2;
      item.selected = state.selected === 'item';
      item.addEventListener('select', () => sel('item'));
      list.appendChild(item);
      app.appendChild(header);
      app.appendChild(list);
      wrap.appendChild(app);
    }
    buildTree();

    // ---- State ----
    function buildState() {
      const wrap = document.getElementById('state-panel');
      wrap.innerHTML = '';
      const props = document.createElement('lit-state-row');
      props.name = 'properties'; props.value = 'Reactive';
      props.expandable = true; props.expanded = true; props.badge = '@property';
      props.addEventListener('toggle', () => {
        props.expanded = !props.expanded;
        buildState();
      });
      const count = document.createElement('lit-state-row');
      count.name = 'count'; count.value = '3'; count.type = 'number'; count.depth = 1;
      const label = document.createElement('lit-state-row');
      label.name = 'label'; label.value = 'Buy milk'; label.type = 'string'; label.depth = 1;
      const done = document.createElement('lit-state-row');
      done.name = 'done'; done.value = 'false'; done.type = 'boolean'; done.depth = 1;
      props.appendChild(count);
      props.appendChild(label);
      props.appendChild(done);
      wrap.appendChild(props);

      const hidden = document.createElement('lit-state-row');
      hidden.name = 'hidden'; hidden.value = 'false'; hidden.type = 'boolean'; hidden.badge = '(Ref)';
      wrap.appendChild(hidden);
    }
    buildState();
  </script>
</body>
</html>

<!-- @dsCard group="Components" viewport="700x360" name="DevTools — tree, state, stats" subtitle="StatCard, SegmentedTabs, TreeNode, StateRow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-sans); padding: 22px; }
  .lbl { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-sans); text-transform: uppercase;
    letter-spacing: var(--tracking-caps); color: var(--text-muted); margin: 0 0 8px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .panel { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { StatCard, SegmentedTabs, TreeNode, StateRow } = window.LitDesignSystem_5536fe;
  function Demo() {
    const [tab, setTab] = React.useState('props');
    const [sel, setSel] = React.useState('list');
    return (
      <div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 22 }}>
          <StatCard icon="package" value="v3.2.1" label="Lit" accent />
          <StatCard icon="route" value="6" label="pages" />
          <StatCard icon="components" value="24" label="custom elements" />
        </div>
        <div style={{ marginBottom: 14 }}>
          <SegmentedTabs value={tab} onChange={setTab}
            items={[{id:'props',label:'Properties'},{id:'attrs',label:'Attributes'},{id:'events',label:'Events'}]} />
        </div>
        <div className="cols">
          <div>
            <p className="lbl">TreeNode</p>
            <div className="panel">
              <TreeNode tag="todo-app" depth={0} expandable expanded onSelect={()=>setSel('app')} selected={sel==='app'}>
                <TreeNode tag="todo-header" depth={1} onSelect={()=>setSel('header')} selected={sel==='header'} />
                <TreeNode tag="todo-list" depth={1} expandable expanded badge="3" onSelect={()=>setSel('list')} selected={sel==='list'}>
                  <TreeNode tag="todo-item" depth={2} onSelect={()=>setSel('item')} selected={sel==='item'} />
                </TreeNode>
              </TreeNode>
            </div>
          </div>
          <div>
            <p className="lbl">StateRow</p>
            <div className="panel">
              <StateRow name="properties" value="Reactive" expandable expanded badge="@property">
                <StateRow name="count" value={3} type="number" depth={1} />
                <StateRow name="label" value="Buy milk" type="string" depth={1} />
                <StateRow name="done" value={false} type="boolean" depth={1} />
              </StateRow>
              <StateRow name="hidden" value="false" type="boolean" badge="(Ref)" />
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>

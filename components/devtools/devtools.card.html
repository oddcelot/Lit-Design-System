<!-- @dsCard group="Components" viewport="700x360" name="DevTools — tree, state, stats" subtitle="StatCard, SegmentedTabs, TreeNode, StateRow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-sans); padding: 22px; }
  .lbl { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-sans); text-transform: uppercase;
    letter-spacing: var(--tracking-caps); color: var(--text-muted); margin: 0 0 8px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .panel { background: var(--surface-container); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 8px; }
</style>
</head>
<body>
  <div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 22px;">
    <lit-stat-card icon="package" value="v3.2.1" label="Lit" accent></lit-stat-card>
    <lit-stat-card icon="route" value="6" label="pages"></lit-stat-card>
    <lit-stat-card icon="components" value="24" label="custom elements"></lit-stat-card>
  </div>

  <div style="margin-bottom: 14;">
    <lit-segmented-tabs id="demo-tabs"></lit-segmented-tabs>
  </div>

  <div class="cols">
    <div>
      <p class="lbl">TreeNode</p>
      <div class="panel" id="tree-panel">
        <lit-tree-node tag="todo-app" depth="0" expandable expanded data-id="app">
          <lit-tree-node tag="todo-header" depth="1" data-id="header"></lit-tree-node>
          <lit-tree-node tag="todo-list" depth="1" expandable expanded badge="3" selected data-id="list">
            <lit-tree-node tag="todo-item" depth="2" data-id="item"></lit-tree-node>
          </lit-tree-node>
        </lit-tree-node>
      </div>
    </div>
    <div>
      <p class="lbl">StateRow</p>
      <div class="panel" id="state-panel">
        <lit-state-row name="properties" value="Reactive" expandable expanded badge="@property">
          <lit-state-row name="count" value="3" type="number" depth="1"></lit-state-row>
          <lit-state-row name="label" value="Buy milk" type="string" depth="1"></lit-state-row>
          <lit-state-row name="done" value="false" type="boolean" depth="1"></lit-state-row>
        </lit-state-row>
        <lit-state-row name="hidden" value="false" type="boolean" badge="(Ref)"></lit-state-row>
      </div>
    </div>
  </div>

  <script type="module" src="../../src/index.ts"></script>
  <script type="module">
    // ---- Tabs ----
    const tabs = document.getElementById('demo-tabs');
    tabs.items = [
      { id: 'props', label: 'Properties' },
      { id: 'attrs', label: 'Attributes' },
      { id: 'events', label: 'Events' },
    ];
    tabs.value = 'props';

    // ---- Tree selection ----
    document.getElementById('tree-panel').addEventListener('select', (e) => {
      e.currentTarget.querySelectorAll('lit-tree-node').forEach((n) => n.selected = false);
      e.target.selected = true;
    });

    // ---- State toggle ----
    document.getElementById('state-panel').addEventListener('toggle', (e) => {
      const row = e.target;
      row.expanded = !row.expanded;
    });
  </script>
</body>
</html>

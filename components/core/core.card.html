<!-- @dsCard group="Components" viewport="700x300" name="Buttons & actions" subtitle="Button variants/sizes, IconButton, Badge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-sans);
    padding: 22px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .lbl { width: 100%; font: var(--weight-semibold) var(--text-2xs)/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-muted);
    margin-bottom: 2px; }
</style>
</head>
<body>
  <div class="row">
    <span class="lbl">Button — variants</span>
    <lit-button variant="primary" icon="plus">New element</lit-button>
    <lit-button variant="secondary" icon="filter">Filter</lit-button>
    <lit-button variant="ghost">Reset</lit-button>
    <lit-button variant="danger" icon="close">Disconnect</lit-button>
    <lit-button variant="primary" disabled>Disabled</lit-button>
  </div>
  <div class="row">
    <span class="lbl">Sizes &amp; icon-only</span>
    <lit-button size="sm" variant="secondary">Small</lit-button>
    <lit-button size="md" variant="secondary">Medium</lit-button>
    <lit-button size="lg" variant="secondary">Large</lit-button>
    <lit-icon-button icon="refresh" label="Reload" variant="solid"></lit-icon-button>
    <lit-icon-button icon="settings" label="Settings"></lit-icon-button>
    <lit-icon-button icon="components" label="Elements" active></lit-icon-button>
  </div>
  <div class="row">
    <span class="lbl">Badge — tones</span>
    <lit-badge tone="accent">reactive</lit-badge>
    <lit-badge tone="cyan">@property</lit-badge>
    <lit-badge tone="success" dot>connected</lit-badge>
    <lit-badge tone="warning">deprecated</lit-badge>
    <lit-badge tone="error" dot>error</lit-badge>
    <lit-badge tone="neutral" mono>v3.2.1</lit-badge>
  </div>

  <script type="module" src="../../src/index.ts"></script>
  <script type="module" src="../../src/site-nav.ts"></script>
</body>
</html>

<!-- @dsCard group="Brand" viewport="1280x720" name="Light & Dark themes" subtitle="Same components in both palettes, side by side" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lit — Light &amp; Dark Themes</title>
<link rel="icon" href="assets/flame-favicon.svg" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; min-height: 100%; }
  /* page chrome uses the dark (root) palette */
  body {
    background:
      radial-gradient(120% 70% at 50% -10%, hsl(232 60% 12% / 0.45), transparent 55%),
      var(--ink-0);
    font-family: var(--font-sans);
    color: var(--text);
    padding: 32px 28px 56px;
    box-sizing: border-box;
  }
  .page-head {
    display: flex; align-items: center; gap: 16px;
    max-width: 1180px; margin: 0 auto 8px;
  }
  .page-head h1 {
    margin: 0; font: var(--weight-extrabold) var(--text-2xl)/1 var(--font-sans);
    color: var(--text-strong); letter-spacing: var(--tracking-tight);
  }
  .page-head p {
    margin: 4px 0 0; font: var(--weight-regular) var(--text-sm)/1.4 var(--font-sans);
    color: var(--text-secondary);
  }
  .toolbar { margin: 22px 0 18px; display: flex; justify-content: center; }
  #root { max-width: 1180px; margin: 0 auto; }
  .panels { display: grid; gap: 22px; }
  .panels.both { grid-template-columns: 1fr 1fr; }
  .panels.single { grid-template-columns: 1fr; }
</style>
</head>
<body>
  <div class="page-head">
    <img src="assets/flame.svg" height="44" alt="Lit" />
    <div>
      <h1>Light &amp; Dark</h1>
      <p>One token set, two palettes. Dark is the default DevTools surface; <code style="font-family:var(--font-mono)">.theme-light</code> is the lit.dev website theme.</p>
    </div>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
  const { StatCard, Button, IconButton, Badge, Input, Switch, Card,
          SegmentedTabs, TreeNode, StateRow, Icon } = window.LitDesignSystem_5536fe;

  function Panel({ theme }) {
    const isLight = theme === 'theme-light';
    const [tab, setTab] = React.useState('props');
    const [on, setOn] = React.useState(true);
    const [on2, setOn2] = React.useState(false);
    const [sel, setSel] = React.useState('item');
    return (
      <div className={theme} style={{
        background: 'var(--surface)',
        border: '1px solid var(--border)',
        borderRadius: 'var(--radius-2xl)',
        overflow: 'hidden',
        boxShadow: 'var(--shadow-lg)',
      }}>
        {/* panel header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 18px',
          borderBottom: '1px solid var(--border-subtle)', background: 'var(--surface-low)' }}>
          <Icon name={isLight ? 'eye' : 'zap'} size={18} style={{ color: 'var(--accent)' }} />
          <span style={{ font: 'var(--weight-bold) var(--text-md)/1 var(--font-sans)', color: 'var(--text-strong)' }}>
            {isLight ? 'Light' : 'Dark'} theme
          </span>
          <Badge tone="neutral" mono>{isLight ? '.theme-light' : ':root'}</Badge>
          <span style={{ marginLeft: 'auto' }}>
            <Badge tone={isLight ? 'success' : 'accent'} dot>{isLight ? 'website' : 'devtools'}</Badge>
          </span>
        </div>

        <div style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 18 }}>
          {/* stat cards */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10 }}>
            <StatCard icon="package" value="v3.2.1" label="Lit" accent />
            <StatCard icon="route" value="6" label="pages" />
            <StatCard icon="components" value="24" label="elements" />
          </div>

          {/* controls card */}
          <Card title="Controls">
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, marginBottom: 14 }}>
              <Button variant="primary" icon="plus">New</Button>
              <Button variant="secondary" icon="filter">Filter</Button>
              <Button variant="ghost">Reset</Button>
              <Button variant="danger" icon="close">Stop</Button>
              <IconButton icon="refresh" label="Reload" variant="solid" />
              <IconButton icon="components" label="Elements" active />
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 14 }}>
              <Badge tone="accent">reactive</Badge>
              <Badge tone="cyan">@property</Badge>
              <Badge tone="success" dot>connected</Badge>
              <Badge tone="warning">deprecated</Badge>
              <Badge tone="error" dot>error</Badge>
            </div>
            <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
              <Input icon="search" placeholder="Find components…" />
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 14 }}>
              <Switch checked={on} onChange={setOn} label="Highlight updates" />
              <Switch checked={on2} onChange={setOn2} label="Group by file" />
            </div>
            <SegmentedTabs value={tab} onChange={setTab}
              items={[{id:'props',label:'Properties'},{id:'attrs',label:'Attributes'},{id:'events',label:'Events'}]} />
          </Card>

          {/* mini inspector */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div style={{ background: 'var(--surface-container)', border: '1px solid var(--border-subtle)',
              borderRadius: 'var(--radius-lg)', padding: 8 }}>
              <TreeNode tag="todo-app" depth={0} expandable expanded
                selected={sel==='app'} onSelect={()=>setSel('app')}>
                <TreeNode tag="todo-header" depth={1} selected={sel==='header'} onSelect={()=>setSel('header')} />
                <TreeNode tag="todo-list" depth={1} expandable expanded badge="3"
                  selected={sel==='list'} onSelect={()=>setSel('list')}>
                  <TreeNode tag="todo-item" depth={2} selected={sel==='item'} onSelect={()=>setSel('item')} />
                </TreeNode>
              </TreeNode>
            </div>
            <div style={{ background: 'var(--surface-container)', border: '1px solid var(--border-subtle)',
              borderRadius: 'var(--radius-lg)', padding: 8 }}>
              <StateRow name="properties" value="Reactive" expandable expanded badge="@property">
                <StateRow name="label" value="Buy oat milk" type="string" depth={1} />
                <StateRow name="index" value={1} type="number" depth={1} />
                <StateRow name="done" value={false} type="boolean" depth={1} />
              </StateRow>
              <StateRow name="node" value="<todo-item>" type="ref" />
            </div>
          </div>
        </div>
      </div>
    );
  }

  function App() {
    const [mode, setMode] = React.useState('both');
    return (
      <React.Fragment>
        <div className="toolbar">
          <SegmentedTabs value={mode} onChange={setMode} items={[
            { id: 'both', label: 'Side by side' },
            { id: 'theme-dark', label: 'Dark' },
            { id: 'theme-light', label: 'Light' },
          ]} />
        </div>
        {mode === 'both' ? (
          <div className="panels both">
            <Panel theme="theme-dark" />
            <Panel theme="theme-light" />
          </div>
        ) : (
          <div className="panels single"><Panel theme={mode} /></div>
        )}
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

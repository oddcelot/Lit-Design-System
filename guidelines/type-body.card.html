<!-- @dsCard group="Type" viewport="700x190" name="Body & weights — Manrope" subtitle="UI text sizes and weight ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); color: var(--text);
    padding: 22px; }
  .line { display: flex; align-items: baseline; gap: 16px; margin-bottom: 9px; }
  .spec { font: var(--weight-regular) var(--text-2xs)/1 var(--font-mono); color: var(--text-muted);
    width: 110px; flex-shrink: 0; }
  .weights { display: flex; gap: 18px; margin-top: 14px; font-size: var(--text-lg); }
  .weights span { display: inline-flex; flex-direction: column; gap: 2px; }
  .weights small { font: var(--weight-regular) var(--text-2xs)/1 var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="line"><span class="spec">lg · 500</span><span style="font-size:var(--text-lg);font-weight:500">The DevTools attaches to any Lit app.</span></div>
  <div class="line"><span class="spec">md · 400</span><span style="font-size:var(--text-md)">Body copy for panels and documentation.</span></div>
  <div class="line"><span class="spec">sm · 400</span><span style="font-size:var(--text-sm)">Default control & tree-row size (13px).</span></div>
  <div class="line"><span class="spec">xs · 500</span><span style="font-size:var(--text-xs);color:var(--text-secondary)">Captions, tags and gutter labels.</span></div>
  <div class="weights">
    <span style="font-weight:400">Aa<small>400</small></span>
    <span style="font-weight:500">Aa<small>500</small></span>
    <span style="font-weight:600">Aa<small>600</small></span>
    <span style="font-weight:700">Aa<small>700</small></span>
    <span style="font-weight:800">Aa<small>800</small></span>
  </div>
</body>
</html>

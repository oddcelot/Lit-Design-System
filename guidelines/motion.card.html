<!-- @dsCard group="Spacing" viewport="700x140" name="Motion" subtitle="Durations & easing — quick, restrained" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 22px; color: var(--text); }
  .track { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .name { width: 120px; font: var(--weight-medium) var(--text-xs)/1 var(--font-mono); color: var(--text-secondary); }
  .rail { flex: 1; height: 6px; background: var(--surface-container-high); border-radius: var(--radius-pill); position: relative; overflow: hidden; }
  .dot { position: absolute; top: -3px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); animation: slide 2.4s infinite; }
  .d1 { animation-timing-function: var(--ease-standard); animation-duration: 1.4s; }
  .d2 { animation-timing-function: var(--ease-emphasized); animation-duration: 1.8s; }
  .d3 { animation-timing-function: var(--ease-out); animation-duration: 2.2s; }
  @keyframes slide { 0% { left: 0 } 50% { left: calc(100% - 12px) } 100% { left: 0 } }
</style>
</head>
<body>
  <div class="track"><span class="name">ease-standard</span><div class="rail"><div class="dot d1"></div></div></div>
  <div class="track"><span class="name">ease-emphasized</span><div class="rail"><div class="dot d2"></div></div></div>
  <div class="track"><span class="name">ease-out</span><div class="rail"><div class="dot d3"></div></div></div>
  <div style="font:var(--weight-regular) var(--text-2xs)/1.5 var(--font-mono);color:var(--text-muted);margin-top:6px">durations · fast 140ms · normal 220ms · slow 360ms</div>
</body>
</html>

<!-- @dsCard group="Type" viewport="700x180" name="Display — Manrope" subtitle="Hero & heading scale, extrabold/bold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); color: var(--text-strong);
    padding: 22px; }
  .line { display: flex; align-items: baseline; gap: 16px; margin-bottom: 10px; }
  .spec { font: var(--weight-regular) var(--text-2xs)/1 var(--font-mono); color: var(--text-muted);
    width: 110px; flex-shrink: 0; }
  .d5 { font-weight: var(--weight-extrabold); font-size: var(--text-5xl); letter-spacing: var(--tracking-tight); line-height: 1; }
  .d3 { font-weight: var(--weight-extrabold); font-size: var(--text-3xl); letter-spacing: var(--tracking-tight); }
  .d2 { font-weight: var(--weight-bold); font-size: var(--text-2xl); letter-spacing: var(--tracking-snug); }
</style>
</head>
<body>
  <div class="line"><span class="spec">5xl · 800</span><span class="d5">DevTools</span></div>
  <div class="line"><span class="spec">3xl · 800</span><span class="d3">Inspect every element</span></div>
  <div class="line"><span class="spec">2xl · 700</span><span class="d2">Reactive properties</span></div>
  <script type="module" src="../src/site-nav.ts"></script>
</body>
</html>

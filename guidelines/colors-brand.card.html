<!-- @dsCard group="Colors" viewport="700x150" name="Brand — the Lit flame" subtitle="Flame blue, indigo, cyan, dark-cyan" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 20px;
    display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--surface-container); }
  .name { font: var(--weight-semibold) var(--text-xs)/1.3 var(--font-sans); color: var(--text); }
  .hex { font: var(--weight-regular) var(--text-2xs)/1.4 var(--font-mono); color: var(--text-secondary); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:#324fff"></div><div class="meta"><div class="name">Flame Blue</div><div class="hex">--lit-blue · 324fff</div></div></div>
  <div class="sw"><div class="chip" style="background:#4d63ff"></div><div class="meta"><div class="name">Blue Bright</div><div class="hex">--lit-blue-bright</div></div></div>
  <div class="sw"><div class="chip" style="background:#2a2c9d"></div><div class="meta"><div class="name">Indigo</div><div class="hex">--lit-indigo · 2a2c9d</div></div></div>
  <div class="sw"><div class="chip" style="background:#00e8ff"></div><div class="meta"><div class="name">Dark Cyan</div><div class="hex">--lit-dark-cyan</div></div></div>
  <div class="sw"><div class="chip" style="background:#91ffff"></div><div class="meta"><div class="name">Cyan Soft</div><div class="hex">--lit-cyan-soft</div></div></div>
  <script type="module" src="../src/site-nav.ts"></script>
</body>
</html>

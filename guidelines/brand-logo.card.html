<!-- @dsCard group="Brand" viewport="700x170" name="Logo & lockup" subtitle="The Lit flame + DevTools wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 24px;
    display: flex; align-items: center; gap: 40px; }
  .lockup { display: flex; align-items: center; gap: 16px; }
  .word { font: var(--weight-extrabold) var(--text-3xl)/1 var(--font-sans); color: var(--text-strong);
    letter-spacing: var(--tracking-tight); }
  .word b { color: var(--accent); }
  .sizes { display: flex; align-items: flex-end; gap: 20px; padding-left: 40px; border-left: 1px solid var(--border); }
  .cap { font: var(--weight-regular) var(--text-2xs)/1 var(--font-mono); color: var(--text-muted);
    text-align: center; margin-top: 8px; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/flame.svg" alt="Lit flame" height="60" />
    <div class="word">Lit<b>DevTools</b></div>
  </div>
  <div class="sizes">
    <div><img src="../assets/flame.svg" height="56" alt="" /><div class="cap">56</div></div>
    <div><img src="../assets/flame.svg" height="36" alt="" /><div class="cap">36</div></div>
    <div><img src="../assets/flame.svg" height="24" alt="" /><div class="cap">24</div></div>
    <div><img src="../assets/flame.svg" height="16" alt="" /><div class="cap">16</div></div>
  </div>
</body>
</html>

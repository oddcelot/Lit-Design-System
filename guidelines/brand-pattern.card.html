<!-- @dsCard group="Brand" viewport="700x160" name="Pattern & texture" subtitle="The repeating 'lit' tile motif" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 0;
    display: flex; gap: 0; height: 160px; }
  .tile { flex: 2; background-image: url('../assets/repeat-patterns-lit.webp');
    background-size: 280px; }
  .info { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .info h3 { margin: 0; font: var(--weight-bold) var(--text-md)/1.2 var(--font-sans); color: var(--text); }
  .info p { margin: 0; font: var(--weight-regular) var(--text-xs)/1.5 var(--font-sans); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="tile"></div>
  <div class="info">
    <h3>“lit” repeat tile</h3>
    <p>Used as a hero background wash on marketing surfaces. Pair sparingly with solid panels.</p>
  </div>
  <script type="module" src="../src/site-nav.ts"></script>
</body>
</html>

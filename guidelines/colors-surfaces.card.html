<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces — dark ink scale" subtitle="App void → elevated panels (DevTools default)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 20px;
    display: flex; gap: 8px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 56px; }
  .meta { padding: 7px 8px; background: var(--surface-container); }
  .name { font: var(--weight-semibold) var(--text-2xs)/1.3 var(--font-sans); color: var(--text); }
  .var { font: var(--weight-regular) 10px/1.4 var(--font-mono); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">bg</div><div class="var">ink-0</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-low)"></div><div class="meta"><div class="name">surface-low</div><div class="var">ink-1</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="meta"><div class="name">surface</div><div class="var">ink-2</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-container)"></div><div class="meta"><div class="name">container</div><div class="var">ink-4</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-container-high)"></div><div class="meta"><div class="name">container-hi</div><div class="var">ink-5</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-elevated)"></div><div class="meta"><div class="name">elevated</div><div class="var">ink-6</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--border-strong)"></div><div class="meta"><div class="name">border</div><div class="var">ink-7</div></div></div>
  <script type="module" src="../src/site-nav.ts"></script>
</body>
</html>

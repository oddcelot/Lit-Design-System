<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & accent" subtitle="Accent, cyan, success, warning, error, info" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 20px;
    display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 52px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .name { font: var(--weight-semibold) var(--text-xs)/1.3 var(--font-sans); color: var(--text); margin-top: 8px; }
  .var { font: var(--weight-regular) var(--text-2xs)/1.4 var(--font-mono); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">Accent</div><div class="var">--accent</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-cyan)"></div><div class="name">Cyan</div><div class="var">--accent-cyan</div></div>
  <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="name">Success</div><div class="var">--success</div></div>
  <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="name">Warning</div><div class="var">--warning</div></div>
  <div class="sw"><div class="chip" style="background:var(--error)"></div><div class="name">Error</div><div class="var">--error</div></div>
  <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="name">Info</div><div class="var">--info</div></div>
  <script type="module" src="../src/site-nav.ts"></script>
</body>
</html>
